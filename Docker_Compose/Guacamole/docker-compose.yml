services:
  dbmysql:
    container_name: guacamole-db
    networks:
      - net-guaca
    image: mysql
    volumes:
      - $PWD/conf/initdb.sql:/docker-entrypoint-initdb.d/initdb.sql
      - $PWD/data:/var/lib/mysql
    env_file: env.env
    ports:
      - "3306:3306"
  daemon:
    container_name: guacamole-daemon
    networks:
      - net-guaca
    image: guacamole/guacd
    depends_on:
      - dbmysql
  web:
    container_name: guacamole-web
    networks:
      - net-guaca
    image: guacamole/guacamole
    env_file: env.env
    depends_on:
      - daemon
  proxynginx:
    container_name: guacamole-proxy
    networks:
      - net-guaca
    image: nginx
    ports:
      - "80:80"
    volumes:
      - $PWD/nginx-config/nginx.conf:/etc/nginx/nginx.conf
    depends_on:
      - web
networks:
  net-guaca:
